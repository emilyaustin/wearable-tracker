name: Monitor Transparency Reports

on:
  schedule:
    # Monthly: 1st of each month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check transparency report URLs
        run: python scripts/check_urls.py

      - name: Commit data if changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Transparency Monitor"
          git add data/companies.json
          TODAY=$(date -u +%Y-%m-%d)
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: transparency check ${TODAY}"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: ".github,scripts,plans"
          # Uncomment and set your custom domain to enable CNAME:
          # cname: wearable.yourdomain.com
